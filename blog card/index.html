<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Preview Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon-32x32.png">
</head>
<body>
    <main>
        <article class="card">
            <img class="banner" src="illustration-article.svg" alt="banner">
            <p><span class="tag">Learning</span></p>
            <p class="date">Published 21 Dec 2023</p>
            <h1><a href="www.youtube.com">HTML & CSS foundations</a></h1>
            <p class="desc">These languages are the backbone of every website, defining structure, content, and presentation.</p>
            <div class="author">
                <img src="image-avatar.webp" alt="Greg Hooper">
                <p>Greg Hooper</p>
            </div>
        </article>
    </main>
    
</body>
</html>
